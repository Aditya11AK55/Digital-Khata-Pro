<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Khata Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        
        <div id="login-section" class="auth-card">
            <h2>Welcome Back</h2>
            <p>Login to your account</p>
            <form id="login-form">
                <input type="tel" id="login-phone" placeholder="Mobile Number" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="primary-btn">Login</button>
            </form>
            <p class="toggle-link" onclick="showSignup()">Don't have an account? <span>Sign up here</span></p>
        </div>

        <div id="signup-section" class="auth-card hidden">
            <h2>Create Account</h2>
            <p>Register your new shop</p>
            <form id="signup-form">
                <input type="text" id="signup-shop" placeholder="Shop Name" required>
                <input type="tel" id="signup-phone" placeholder="Mobile Number" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <input type="number" id="signup-pin" placeholder="4-Digit Recovery PIN" required>
                <button type="submit" class="primary-btn">Create Account</button>
            </form>
            <p class="toggle-link" onclick="showLogin()">Already have an account? <span>Login here</span></p>
        </div>

        <div id="dashboard-section" class="hidden">
            <header>
                <h3 id="shop-name-display">My Shop</h3>
                <button id="logout-btn">Logout</button>
            </header>

            <div class="stats-container">
                <div class="stat-card">
                    <p>Total Due</p>
                    <h2 id="total-due">₹0</h2>
                </div>
                <div class="stat-card">
                    <p>Total Advance</p>
                    <h2 id="total-advance">₹0</h2>
                </div>
            </div>

            <input type="text" id="search-customer" placeholder="Search customer...">
            
            <div class="section-header-box">
                <h4>Your Customers</h4>
            </div>

            <div id="customer-list">
                </div>

            <button id="add-cust-btn" class="fab">+</button>
        </div>

        <div id="customer-detail-section" class="hidden">
            <header class="detail-header">
                <button id="back-btn" class="icon-btn">⬅ Back</button>
                <h3 id="detail-cust-name">Customer Name</h3>
                <div style="width: 50px;"></div>
            </header>

            <div class="big-balance-card">
                <p>Total Balance</p>
                <h1 id="detail-balance">₹0</h1>
                <p id="detail-status"></p>
            </div>

            <div class="action-buttons">
                <button id="btn-give-credit" class="danger-btn">Give Credit</button>
                <button id="btn-receive-payment" class="success-btn">Receive Payment</button>
            </div>

            <div class="section-header-box" style="margin-bottom: 10px;">
                <h4>Transaction History</h4>
            </div>
            <div id="transaction-list">
                </div>
        </div>

        <div id="add-customer-modal" class="hidden modal">
            <div class="modal-content">
                <h3>Add New Customer</h3>
                <input type="text" id="cust-name" placeholder="Customer Name" required>
                <input type="tel" id="cust-phone" placeholder="Mobile Number" required>
                <button id="save-cust-btn" class="primary-btn">Save Customer</button>
                <button onclick="closeModal()" class="cancel-btn">Cancel</button>
            </div>
        </div>

        <div id="transaction-modal" class="hidden modal">
            <div class="modal-content">
                <h3 id="trx-modal-title">Transaction</h3>
                <input type="number" id="trx-amount" placeholder="Amount (₹)" required>
                <input type="text" id="trx-note" placeholder="Note (Optional)">
                <button id="save-trx-btn" class="primary-btn">Save</button>
                <button onclick="closeTrxModal()" class="cancel-btn">Cancel</button>
            </div>
        </div>

    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
